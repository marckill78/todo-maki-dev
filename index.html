<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6c5ce7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1d2027" />
  <meta name="description" content="ToDo Maki — persönliche Aufgaben, Ziele, Orte und Budget, offline & synchron." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ToDo Maki" />
  <title>ToDo Maki</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=29" />
  <script>
    /* Theme früh setzen, um Flash zu vermeiden */
    (function () {
      var p = localStorage.getItem("maki-theme") || "system";
      var dark = p === "dark" || (p === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    })();
  </script>
</head>
<body>
  <!-- App-Layout: Sidebar + Hauptbereich -->
  <div id="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark">✓</span>
        <span class="brand-name">ToDo&nbsp;Maki</span>
      </div>

      <nav class="nav" id="nav-fixed">
        <button class="nav-item" data-view="myday">
          <span class="nav-ico">☀️</span><span class="nav-label">Mein Tag</span>
          <span class="nav-count" data-count="myday"></span>
        </button>
        <button class="nav-item" data-view="all">
          <span class="nav-ico">📋</span><span class="nav-label">Alle Aufgaben</span>
          <span class="nav-count" data-count="all"></span>
        </button>
        <button class="nav-item" data-view="calendar">
          <span class="nav-ico">📅</span><span class="nav-label">Kalender</span>
        </button>
        <button class="nav-item" data-view="goals">
          <span class="nav-ico">🎯</span><span class="nav-label">Ziele</span>
        </button>
        <button class="nav-item" data-view="places">
          <span class="nav-ico">📍</span><span class="nav-label">Orte</span>
        </button>
        <button class="nav-item" data-view="budget">
          <span class="nav-ico">💶</span><span class="nav-label">Budget</span>
        </button>
        <button class="nav-item" data-view="purchases">
          <span class="nav-ico">🛒</span><span class="nav-label">Anschaffungen</span>
        </button>
      </nav>

      <div class="nav-section">
        <div class="nav-section-head">
          <span>Bereiche</span>
          <button class="icon-btn" id="add-area-btn" title="Bereich hinzufügen">＋</button>
        </div>
        <nav class="nav" id="nav-areas"><!-- dynamisch --></nav>
      </div>

      <div class="sidebar-foot">
        <button class="nav-item" data-view="stats">
          <span class="nav-ico">📊</span><span class="nav-label">Statistik</span>
        </button>
        <button class="nav-item" data-view="archive">
          <span class="nav-ico">📦</span><span class="nav-label">Archiv</span>
        </button>
        <button class="nav-item" data-view="trash">
          <span class="nav-ico">🗑️</span><span class="nav-label">Papierkorb</span>
        </button>
        <button class="nav-item" data-view="settings">
          <span class="nav-ico">⚙️</span><span class="nav-label">Einstellungen</span>
        </button>
      </div>
    </aside>

    <!-- ============ HAUPTBEREICH ============ -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menu-toggle" title="Menü">☰</button>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Suchen…" autocomplete="off" />
        </div>
        <button class="btn-primary" id="quick-add-btn">＋ Neue Aufgabe</button>
      </header>

      <section class="content" id="content"><!-- View-Render-Ziel --></section>
    </main>
  </div>

  <!-- ============ TASK-DETAIL PANEL ============ -->
  <div class="panel-overlay" id="panel-overlay" hidden></div>
  <aside class="task-panel" id="task-panel" hidden><!-- dynamisch --></aside>

  <!-- ============ MODAL (Bereich/Dialoge) ============ -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal"><!-- dynamisch --></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <!-- Login-Gate: Pflicht-Anmeldung (nur auf der Live-Domain aktiv) -->
  <div class="auth-gate" id="auth-gate" hidden>
    <div class="auth-gate-card">
      <span class="brand-mark lg">✓</span>
      <h2>ToDo&nbsp;Maki</h2>
      <p>Melde dich mit Google an, um deine Aufgaben, Ziele, Orte und dein Budget auf allen Geräten synchron zu halten.</p>
      <button class="btn-primary" id="auth-gate-login">Mit Google anmelden</button>
      <p class="muted small" id="auth-gate-err"></p>
    </div>
  </div>

  <!-- Firebase (Auth + Firestore) für Google-Login & Geräte-Sync -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script src="js/icons.js?v=29"></script>
  <script src="js/db.js?v=29"></script>
  <script src="js/sync.js?v=29"></script>
  <script src="js/store.js?v=29"></script>
  <script src="js/app.js?v=29"></script>
</body>
</html>
